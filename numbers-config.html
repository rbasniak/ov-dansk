<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f172a" />
  <title>Numbers – Configure | Danish Practice</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/twemoji@14.0.2/dist/twemoji.min.js" crossorigin="anonymous"></script>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <a href="index.html" class="back-btn" aria-label="Back">←</a>
    <div>
      <div class="page-title">Numbers</div>
    </div>
  </div>

  <p class="intro-text">Configure your practice session below, then tap Start.</p>

  <!-- ── Exercise Type ──────────────────────────────────────── -->
  <div class="section">
    <div class="section-title">Exercise Type</div>
    <div class="radio-group" id="grp-type">

      <label class="radio-option selected">
        <input type="radio" name="extype" value="audio-to-num" checked />
        <div class="radio-dot"></div>
        <div class="radio-text">
          <span class="radio-label">🔊 Hear the number</span>
          <span class="radio-sublabel">Listen to a Danish number and pick the correct numeral</span>
        </div>
      </label>

      <label class="radio-option">
        <input type="radio" name="extype" value="num-to-written" />
        <div class="radio-dot"></div>
        <div class="radio-text">
          <span class="radio-label">🔢 Find the written form</span>
          <span class="radio-sublabel">See a numeral and pick how it is written in Danish</span>
        </div>
      </label>

    </div>
  </div>

  <!-- ── Number of Questions ────────────────────────────────── -->
  <div class="section">
    <div class="section-title">Number of Questions</div>
    <div class="radio-group row" id="grp-count">

      <label class="radio-option compact selected">
        <input type="radio" name="count" value="10" checked />
        <div class="radio-dot"></div>
        <span class="radio-label">10</span>
      </label>

      <label class="radio-option compact">
        <input type="radio" name="count" value="20" />
        <div class="radio-dot"></div>
        <span class="radio-label">20</span>
      </label>

      <label class="radio-option compact">
        <input type="radio" name="count" value="50" />
        <div class="radio-dot"></div>
        <span class="radio-label">50</span>
      </label>

      <label class="radio-option compact disabled" title="Not available for numbers">
        <input type="radio" name="count" value="all" disabled />
        <div class="radio-dot"></div>
        <span class="radio-label">ALL</span>
      </label>

    </div>
  </div>

  <!-- ── Time Limit ─────────────────────────────────────────── -->
  <div class="section">
    <div class="section-title">Time per Question</div>
    <div class="radio-group" id="grp-time">

      <label class="radio-option selected">
        <input type="radio" name="timelimit" value="0" checked />
        <div class="radio-dot"></div>
        <div class="radio-text">
          <span class="radio-label">No limit</span>
          <span class="radio-sublabel">Take as long as you need</span>
        </div>
      </label>

      <label class="radio-option">
        <input type="radio" name="timelimit" value="30" />
        <div class="radio-dot"></div>
        <div class="radio-text">
          <span class="radio-label">30 seconds</span>
        </div>
      </label>

      <label class="radio-option">
        <input type="radio" name="timelimit" value="15" />
        <div class="radio-dot"></div>
        <div class="radio-text">
          <span class="radio-label">15 seconds</span>
          <span class="radio-sublabel">Challenge mode!</span>
        </div>
      </label>

    </div>
  </div>

  <!-- ── Audio ──────────────────────────────────────────────── -->
  <div class="section" id="section-audio">
    <div class="section-title">Audio</div>
    <div id="audio-required-note" class="audio-required-note" style="display:none">
      🔊 Audio is required for "Hear the number" — always on.
    </div>
    <div class="radio-group" id="grp-audio">

      <label class="radio-option selected">
        <input type="radio" name="audio" value="on" checked />
        <div class="radio-dot"></div>
        <div class="radio-text">
          <span class="radio-label">🔊 Audio on</span>
          <span class="radio-sublabel">Auto-play Danish pronunciation after each answer</span>
        </div>
      </label>

      <label class="radio-option">
        <input type="radio" name="audio" value="off" />
        <div class="radio-dot"></div>
        <div class="radio-text">
          <span class="radio-label">🔇 Audio off</span>
          <span class="radio-sublabel">No sound — silent practice</span>
        </div>
      </label>

    </div>
  </div>

  <button class="start-btn" onclick="startExercise()">Start Practice →</button>

  <script src="js/config-prefs.js"></script>
  <script>
    initRadioGroups((name) => {
      if (name === 'extype') {
        updateAudioSection();
      }
    });

    function updateAudioSection() {
      const type       = getRadioValue('extype');
      const isAudio    = type === 'audio-to-num';
      const note       = document.getElementById('audio-required-note');
      const grp        = document.getElementById('grp-audio');
      note.style.display = isAudio ? 'block' : 'none';
      grp.querySelectorAll('.radio-option').forEach(opt => {
        if (isAudio) {
          opt.classList.add('disabled');
          const r = opt.querySelector('input[type="radio"]');
          if (r) {
            r.disabled = true;
          }
        } else {
          opt.classList.remove('disabled');
          const r = opt.querySelector('input[type="radio"]');
          if (r) {
            r.disabled = false;
          }
        }
      });
      if (isAudio) {
        setRadioValue('audio', 'on');
      }
    }

    function loadNumberPrefs() {
      const prefs = loadConfigPrefs(CONFIG_PREFS_KEYS.numbers);
      applyCommonExercisePrefs(prefs, [
        { name: 'extype', key: 'exerciseType' },
        'count',
        { name: 'timelimit', key: 'timeLimit' },
        'audio',
      ]);
      updateAudioSection();
    }

    function startExercise() {
      const config = {
        exerciseType: getRadioValue('extype')    || 'audio-to-num',
        count:        getRadioValue('count')     || '10',
        timeLimit:    getRadioValue('timelimit') || '0',
        audio:        getRadioValue('audio')     || 'on',
      };
      if (config.exerciseType === 'audio-to-num') {
        config.audio = 'on';
      }

      saveConfigPrefs(CONFIG_PREFS_KEYS.numbers, config);
      sessionStorage.setItem('numberConfig', JSON.stringify(config));
      window.location.href = 'numbers-exercise.html';
    }

    loadNumberPrefs();
    twemoji.parse(document.body, { folder: 'svg', ext: '.svg' });
  </script>
</body>
</html>
