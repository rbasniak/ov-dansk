<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f172a" />
  <title>Progress | Danish Practice</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/twemoji@14.0.2/dist/twemoji.min.js" crossorigin="anonymous"></script>
  <!-- Firebase v8 compat SDK -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  <script src="js/firebase.js"></script>
</head>
<body>

  <div class="header">
    <a href="index.html" class="back-btn" aria-label="Back">←</a>
    <div style="flex:1">
      <div class="page-title">My Progress</div>
    </div>
    <div id="auth-btn-container" style="display:flex;gap:6px;align-items:center"></div>
  </div>

  <div id="progress-content">
    <p style="color:var(--text-muted);padding:20px 0">Loading…</p>
  </div>

  <script src="js/verbs-data.js"></script>
  <script src="js/nouns-data.js"></script>

  <script>
    window.addEventListener('load', () => {
      twemoji.parse(document.body, { folder: 'svg', ext: '.svg' });
      initAuth(
        user => { renderAuthButton(); loadProgressPage(); },
        ()   => { renderAuthButton(); showLoginPrompt(); }
      );
    });

    function showLoginPrompt() {
      document.getElementById('progress-content').innerHTML = `
        <div class="login-prompt">
          <div style="font-size:64px;margin-bottom:16px">📊</div>
          <h2>Track your progress</h2>
          <p>Sign in with Google to save your answers and see how you're improving over time.</p>
          <button class="start-btn" onclick="signInWithGoogle()" style="max-width:280px;margin:0 auto;display:block">
            Sign in with Google
          </button>
        </div>
      `;
    }

    /* ── Helpers ──────────────────────────────────────────────── */

    function _countPronunciationVerbs() {
      // Count unique tense forms that exist across all verbs
      const tenseKeys = ['inf', 'imp', 'present', 'past', 'perfect'];
      let total = 0;
      for (const verb of VERBS) {
        for (const k of tenseKeys) {
          if (verb[k] && verb[k] !== '—') total++;
        }
      }
      return total;
    }

    function _countPronunciationNouns() {
      // Count forms that exist (mass nouns skip plural/definitePl)
      const formKeys = ['da', 'definiteSg', 'plural', 'definitePl'];
      let total = 0;
      for (const noun of NOUNS) {
        for (const k of formKeys) {
          if (noun[k]) total++;
        }
      }
      return total;
    }

    // Holds click-detail config for each rendered row, indexed to match the
    // onclick handler embedded in the row's markup.
    let _progressRowData = [];

    function _statBar(label, stats, detailCfg) {
      const idx = _progressRowData.push(detailCfg) - 1;
      const masteredPct = stats.total ? Math.round((stats.mastered / stats.total) * 100) : 0;
      const learningPct = stats.total ? Math.round((stats.learning / stats.total) * 100) : 0;
      const dueChip     = stats.dueCount > 0
        ? `<span class="progress-due-chip">⏰ ${stats.dueCount} due</span>`
        : '';
      return `
        <div class="progress-type-row clickable" onclick="openProgressDetail(${idx})" role="button" tabindex="0"
             onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();openProgressDetail(${idx});}">
          <div class="progress-type-header">
            <span class="progress-type-label">${label}<span class="progress-type-chevron">›</span></span>
            ${dueChip}
            <span class="progress-type-counts">${stats.mastered} mastered · ${stats.learning} learning · ${stats.newCount} new</span>
          </div>
          <div class="progress-bar-stack">
            <div class="progress-bar-track">
              <div class="progress-bar-fill mastered" style="width:${masteredPct}%"></div>
              <div class="progress-bar-fill learning" style="width:${learningPct}%;left:${masteredPct}%"></div>
            </div>
            <span class="progress-bar-pct">${masteredPct}%</span>
          </div>
        </div>`;
    }

    /* ── Word detail modal ───────────────────────────────────── */

    // Splits an itemId like "at se_da-to-en" or "hus_pronunciation_plural"
    // back into { word, extra } using the same substr used to filter it.
    function _extractWord(itemId, substr) {
      if (substr === '_pronunciation_') {
        const idx = itemId.indexOf(substr);
        return { word: itemId.slice(0, idx), extra: itemId.slice(idx + substr.length) };
      }
      const word = itemId.endsWith(substr) ? itemId.slice(0, -substr.length) : itemId.split(substr)[0];
      return { word, extra: null };
    }

    function _humanizeKey(key) {
      return key.replace(/([A-Z])/g, ' $1').replace(/^./, c => c.toUpperCase());
    }

    function _formatDate(ts) {
      return new Date(ts).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
    }

    function _closeProgressModal() {
      const el = document.getElementById('progress-modal-backdrop');
      if (el) el.remove();
      document.removeEventListener('keydown', _progressModalEscHandler);
    }

    function _progressModalEscHandler(e) {
      if (e.key === 'Escape') _closeProgressModal();
    }

    function openProgressDetail(idx) {
      const cfg = _progressRowData[idx];
      if (!cfg) return;
      const now = Date.now();

      const entries = Object.entries(cfg.map)
        .filter(([id]) => id.includes(cfg.substr))
        .map(([id, data]) => {
          const { word, extra } = _extractWord(id, cfg.substr);
          const item = cfg.lookup(word);
          return {
            word,
            extra,
            meaning:     item ? item.meaning : '',
            repetitions: data.repetitions || 0,
            nextReview:  data.nextReview || null,
          };
        });

      const byNextReview = (a, b) => (a.nextReview || 0) - (b.nextReview || 0);
      const mastered = entries.filter(e => e.repetitions >= 3).sort(byNextReview);
      const learning = entries.filter(e => e.repetitions > 0 && e.repetitions < 3).sort(byNextReview);

      const renderRow = e => `
        <div class="progress-word-row">
          <div class="progress-word-main">
            <div class="progress-word-da">${e.word}${e.extra ? ` <span style="color:var(--text-dim);font-weight:400">(${_humanizeKey(e.extra)})</span>` : ''}</div>
            ${e.meaning ? `<div class="progress-word-meaning">${e.meaning}</div>` : ''}
          </div>
          <div class="progress-word-meta${e.nextReview && e.nextReview <= now ? ' due' : ''}">
            ${e.nextReview ? _formatDate(e.nextReview) : '—'}
          </div>
        </div>`;

      const body = `
        <div class="progress-modal-section-title">✅ Mastered (${mastered.length})</div>
        ${mastered.length ? mastered.map(renderRow).join('') : '<div class="progress-modal-empty">No mastered items yet.</div>'}
        <div class="progress-modal-section-title">📘 Learning (${learning.length})</div>
        ${learning.length ? learning.map(renderRow).join('') : '<div class="progress-modal-empty">No items in progress.</div>'}
      `;

      const backdrop = document.createElement('div');
      backdrop.id = 'progress-modal-backdrop';
      backdrop.className = 'progress-modal-backdrop';
      backdrop.addEventListener('click', e => { if (e.target === backdrop) _closeProgressModal(); });
      backdrop.innerHTML = `
        <div class="progress-modal">
          <div class="progress-modal-header">
            <div class="progress-modal-title">${cfg.title} · ${cfg.label}</div>
            <button class="progress-modal-close" aria-label="Close" onclick="_closeProgressModal()">✕</button>
          </div>
          <div class="progress-modal-body">${body}</div>
        </div>`;
      document.body.appendChild(backdrop);
      document.addEventListener('keydown', _progressModalEscHandler);
      twemoji.parse(backdrop, { folder: 'svg', ext: '.svg' });
    }

    function _subjectCard(title, configHref, rows) {
      return `
        <div class="progress-subject-card">
          <div class="progress-subject-title">${title}</div>
          ${rows.join('')}
        </div>
        <a href="${configHref}" class="start-btn" style="display:block;text-align:center;text-decoration:none;margin-top:4px;margin-bottom:20px">
          Practice ${title.replace(/^[^\s]+ /, '')} →
        </a>`;
    }

    /* ── Main ─────────────────────────────────────────────────── */

    async function loadProgressPage() {
      const container = document.getElementById('progress-content');
      container.innerHTML = '<p style="color:var(--text-muted);padding:20px 0">Loading…</p>';

      const [verbsMap, nounsMap] = await Promise.all([
        loadProgress('verbs'),
        loadProgress('nouns'),
      ]);

      const nVerbs = VERBS.length;
      const nNouns = NOUNS.length;
      const nVerbPron = _countPronunciationVerbs();
      const nNounPron = _countPronunciationNouns();

      _progressRowData = [];
      const verbLookup = w => VERBS.find(v => v.inf === w);
      const nounLookup = w => NOUNS.find(n => n.da === w);

      // ── Verbs ──
      const verbRows = [
        _statBar('🔤 Danish → English',  getProgressStatsByType(verbsMap, '_da-to-en', nVerbs),
          { title: '📝 Verbs', label: 'Danish → English', map: verbsMap, substr: '_da-to-en', lookup: verbLookup }),
        _statBar('🔤 English → Danish',  getProgressStatsByType(verbsMap, '_en-to-da', nVerbs),
          { title: '📝 Verbs', label: 'English → Danish', map: verbsMap, substr: '_en-to-da', lookup: verbLookup }),
        _statBar('🔄 Conjugation group', getProgressStatsByType(verbsMap, '_group',    nVerbs),
          { title: '📝 Verbs', label: 'Conjugation group', map: verbsMap, substr: '_group', lookup: verbLookup }),
        _statBar('🗣 Pronunciation',      getProgressStatsByType(verbsMap, '_pronunciation_', nVerbPron),
          { title: '📝 Verbs', label: 'Pronunciation', map: verbsMap, substr: '_pronunciation_', lookup: verbLookup }),
      ];

      // ── Nouns ──
      const nounRows = [
        _statBar('🔤 Danish → English',  getProgressStatsByType(nounsMap, '_da-to-en',    nNouns),
          { title: '📖 Nouns', label: 'Danish → English', map: nounsMap, substr: '_da-to-en', lookup: nounLookup }),
        _statBar('🔤 English → Danish',  getProgressStatsByType(nounsMap, '_en-to-da',    nNouns),
          { title: '📖 Nouns', label: 'English → Danish', map: nounsMap, substr: '_en-to-da', lookup: nounLookup }),
        _statBar('♂♀ Gender',            getProgressStatsByType(nounsMap, '_gender',       nNouns),
          { title: '📖 Nouns', label: 'Gender', map: nounsMap, substr: '_gender', lookup: nounLookup }),
        _statBar('📚 Plural class',       getProgressStatsByType(nounsMap, '_plural-class', nNouns),
          { title: '📖 Nouns', label: 'Plural class', map: nounsMap, substr: '_plural-class', lookup: nounLookup }),
        _statBar('🗣 Pronunciation',      getProgressStatsByType(nounsMap, '_pronunciation_', nNounPron),
          { title: '📖 Nouns', label: 'Pronunciation', map: nounsMap, substr: '_pronunciation_', lookup: nounLookup }),
      ];

      container.innerHTML =
        _subjectCard('📝 Verbs', 'verbs-config.html', verbRows) +
        _subjectCard('📖 Nouns', 'nouns-config.html', nounRows);
    }
  </script>
</body>
</html>
