<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f172a" />
  <title>Progress | Danish Practice</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/twemoji@14.0.2/dist/twemoji.min.js" crossorigin="anonymous"></script>
  <!-- Firebase v8 compat SDK -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  <script src="js/firebase.js"></script>
</head>
<body>

  <div class="header">
    <a href="index.html" class="back-btn" aria-label="Back">←</a>
    <div style="flex:1">
      <div class="page-title">My Progress</div>
    </div>
    <div id="auth-btn-container" style="display:flex;gap:6px;align-items:center"></div>
  </div>

  <div id="progress-content">
    <p style="color:var(--text-muted);padding:20px 0">Loading…</p>
  </div>

  <script src="js/verbs-data.js"></script>
  <script src="js/nouns-data.js"></script>

  <script>
    window.addEventListener('load', () => {
      twemoji.parse(document.body, { folder: 'svg', ext: '.svg' });
      initAuth(
        user => { renderAuthButton(); loadProgressPage(); },
        ()   => { renderAuthButton(); showLoginPrompt(); }
      );
    });

    function showLoginPrompt() {
      document.getElementById('progress-content').innerHTML = `
        <div class="login-prompt">
          <div style="font-size:64px;margin-bottom:16px">📊</div>
          <h2>Track your progress</h2>
          <p>Sign in with Google to save your answers and see how you're improving over time.</p>
          <button class="start-btn" onclick="signInWithGoogle()" style="max-width:280px;margin:0 auto;display:block">
            Sign in with Google
          </button>
        </div>
      `;
    }

    /* ── Helpers ──────────────────────────────────────────────── */

    function _countPronunciationVerbs() {
      // Count unique tense forms that exist across all verbs
      const tenseKeys = ['inf', 'imp', 'present', 'past', 'perfect'];
      let total = 0;
      for (const verb of VERBS) {
        for (const k of tenseKeys) {
          if (verb[k] && verb[k] !== '—') total++;
        }
      }
      return total;
    }

    function _countPronunciationNouns() {
      // Count forms that exist (mass nouns skip plural/definitePl)
      const formKeys = ['da', 'definiteSg', 'plural', 'definitePl'];
      let total = 0;
      for (const noun of NOUNS) {
        for (const k of formKeys) {
          if (noun[k]) total++;
        }
      }
      return total;
    }

    function _statBar(label, stats) {
      const masteredPct = stats.total ? Math.round((stats.mastered / stats.total) * 100) : 0;
      const learningPct = stats.total ? Math.round((stats.learning / stats.total) * 100) : 0;
      const dueChip     = stats.dueCount > 0
        ? `<span class="progress-due-chip">⏰ ${stats.dueCount} due</span>`
        : '';
      return `
        <div class="progress-type-row">
          <div class="progress-type-header">
            <span class="progress-type-label">${label}</span>
            ${dueChip}
            <span class="progress-type-counts">${stats.mastered} mastered · ${stats.learning} learning · ${stats.newCount} new</span>
          </div>
          <div class="progress-bar-stack">
            <div class="progress-bar-track">
              <div class="progress-bar-fill mastered" style="width:${masteredPct}%"></div>
              <div class="progress-bar-fill learning" style="width:${learningPct}%;left:${masteredPct}%"></div>
            </div>
            <span class="progress-bar-pct">${masteredPct}%</span>
          </div>
        </div>`;
    }

    function _subjectCard(title, configHref, rows) {
      return `
        <div class="progress-subject-card">
          <div class="progress-subject-title">${title}</div>
          ${rows.join('')}
        </div>
        <a href="${configHref}" class="start-btn" style="display:block;text-align:center;text-decoration:none;margin-top:4px;margin-bottom:20px">
          Practice ${title.replace(/^[^\s]+ /, '')} →
        </a>`;
    }

    /* ── Main ─────────────────────────────────────────────────── */

    async function loadProgressPage() {
      const container = document.getElementById('progress-content');
      container.innerHTML = '<p style="color:var(--text-muted);padding:20px 0">Loading…</p>';

      const [verbsMap, nounsMap] = await Promise.all([
        loadProgress('verbs'),
        loadProgress('nouns'),
      ]);

      const nVerbs = VERBS.length;
      const nNouns = NOUNS.length;
      const nVerbPron = _countPronunciationVerbs();
      const nNounPron = _countPronunciationNouns();

      // ── Verbs ──
      const verbRows = [
        _statBar('🔤 Danish → English',  getProgressStatsByType(verbsMap, '_da-to-en', nVerbs)),
        _statBar('🔤 English → Danish',  getProgressStatsByType(verbsMap, '_en-to-da', nVerbs)),
        _statBar('🔄 Conjugation group', getProgressStatsByType(verbsMap, '_group',    nVerbs)),
        _statBar('🗣 Pronunciation',      getProgressStatsByType(verbsMap, '_pronunciation_', nVerbPron)),
      ];

      // ── Nouns ──
      const nounRows = [
        _statBar('🔤 Danish → English',  getProgressStatsByType(nounsMap, '_da-to-en',    nNouns)),
        _statBar('🔤 English → Danish',  getProgressStatsByType(nounsMap, '_en-to-da',    nNouns)),
        _statBar('♂♀ Gender',            getProgressStatsByType(nounsMap, '_gender',       nNouns)),
        _statBar('📚 Plural class',       getProgressStatsByType(nounsMap, '_plural-class', nNouns)),
        _statBar('🗣 Pronunciation',      getProgressStatsByType(nounsMap, '_pronunciation_', nNounPron)),
      ];

      container.innerHTML =
        _subjectCard('📝 Verbs', 'verbs-config.html', verbRows) +
        _subjectCard('📖 Nouns', 'nouns-config.html', nounRows);
    }
  </script>
</body>
</html>
