<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f172a" />
  <title>Nouns – Configure | Danish Practice</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/twemoji@14.0.2/dist/twemoji.min.js" crossorigin="anonymous"></script>
  <!-- Firebase v8 compat SDK -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  <script src="js/firebase.js"></script>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <a href="index.html" class="back-btn" aria-label="Back">←</a>
    <div style="flex:1">
      <div class="page-title">Nouns</div>
    </div>
    <div id="auth-btn-container" style="display:flex;gap:6px;align-items:center"></div>
  </div>

  <p class="intro-text">Configure your practice session below, then tap Start.</p>

  <!-- ── Categories ───────────────────────────────────────────── -->
  <div class="section">
    <div class="section-title-row">
      <div class="section-title">Categories</div>
      <div class="section-actions">
        <button type="button" class="link-btn" id="select-all-categories">All</button>
        <button type="button" class="link-btn" id="clear-categories">Clear</button>
      </div>
    </div>
    <p class="section-hint">Select one or more — questions are drawn from your chosen categories.</p>
    <div class="checkbox-group scrollable" id="grp-category"></div>
  </div>

  <!-- ── Exercise Type ────────────────────────────────────────── -->
  <div class="section">
    <div class="section-title">Exercise Type</div>
    <div class="radio-group" id="grp-type">

      <label class="radio-option selected">
        <input type="radio" name="extype" value="en-to-da" checked />
        <div class="radio-dot"></div>
        <div class="radio-text">
          <span class="radio-label">🇬🇧 → 🇩🇰 Translate to Danish</span>
          <span class="radio-sublabel">See the English meaning, pick the correct Danish noun</span>
        </div>
      </label>

      <label class="radio-option">
        <input type="radio" name="extype" value="da-to-en" />
        <div class="radio-dot"></div>
        <div class="radio-text">
          <span class="radio-label">🇩🇰 → 🇬🇧 Translate to English</span>
          <span class="radio-sublabel">See a Danish noun, pick its English meaning</span>
        </div>
      </label>

      <label class="radio-option">
        <input type="radio" name="extype" value="gender" />
        <div class="radio-dot"></div>
        <div class="radio-text">
          <span class="radio-label">⚥ Gender</span>
          <span class="radio-sublabel">Is this noun <strong>en</strong> or <strong>et</strong>?</span>
        </div>
      </label>

      <label class="radio-option">
        <input type="radio" name="extype" value="plural-class" />
        <div class="radio-dot"></div>
        <div class="radio-text">
          <span class="radio-label">🗂 Plural class</span>
          <span class="radio-sublabel">Which plural group does this noun belong to?</span>
        </div>
      </label>

      <label class="radio-option">
        <input type="radio" name="extype" value="pronunciation" />
        <div class="radio-dot"></div>
        <div class="radio-text">
          <span class="radio-label">🗣 Pronunciation</span>
          <span class="radio-sublabel">Hear indefinite, definite, plural &amp; definite plural — self-assess your pronunciation</span>
        </div>
      </label>

    </div>
  </div>

  <!-- ── Number of Questions ──────────────────────────────────── -->
  <div class="section">
    <div class="section-title">Number of Questions</div>
    <div class="radio-group row" id="grp-count">

      <label class="radio-option compact selected">
        <input type="radio" name="count" value="10" checked />
        <div class="radio-dot"></div>
        <span class="radio-label">10</span>
      </label>

      <label class="radio-option compact">
        <input type="radio" name="count" value="20" />
        <div class="radio-dot"></div>
        <span class="radio-label">20</span>
      </label>

      <label class="radio-option compact">
        <input type="radio" name="count" value="50" />
        <div class="radio-dot"></div>
        <span class="radio-label">50</span>
      </label>

      <label class="radio-option compact">
        <input type="radio" name="count" value="all" />
        <div class="radio-dot"></div>
        <span class="radio-label">ALL</span>
      </label>

    </div>
  </div>

  <!-- ── Time Limit ───────────────────────────────────────────── -->
  <div class="section">
    <div class="section-title">Time per Question</div>
    <div class="radio-group" id="grp-time">

      <label class="radio-option selected">
        <input type="radio" name="timelimit" value="0" checked />
        <div class="radio-dot"></div>
        <div class="radio-text">
          <span class="radio-label">No limit</span>
          <span class="radio-sublabel">Take as long as you need</span>
        </div>
      </label>

      <label class="radio-option">
        <input type="radio" name="timelimit" value="30" />
        <div class="radio-dot"></div>
        <div class="radio-text">
          <span class="radio-label">30 seconds</span>
        </div>
      </label>

      <label class="radio-option">
        <input type="radio" name="timelimit" value="15" />
        <div class="radio-dot"></div>
        <div class="radio-text">
          <span class="radio-label">15 seconds</span>
          <span class="radio-sublabel">Challenge mode!</span>
        </div>
      </label>

    </div>
  </div>

  <!-- ── Audio ────────────────────────────────────────────────── -->
  <div class="section">
    <div class="section-title">Audio</div>
    <div class="radio-group" id="grp-audio">

      <label class="radio-option selected">
        <input type="radio" name="audio" value="on" checked />
        <div class="radio-dot"></div>
        <div class="radio-text">
          <span class="radio-label">🔊 Audio on</span>
          <span class="radio-sublabel">Auto-play Danish pronunciation after each answer</span>
        </div>
      </label>

      <label class="radio-option">
        <input type="radio" name="audio" value="off" />
        <div class="radio-dot"></div>
        <div class="radio-text">
          <span class="radio-label">🔇 Audio off</span>
          <span class="radio-sublabel">No sound — silent practice</span>
        </div>
      </label>

    </div>
  </div>

  <!-- ── Practice Mode (logged-in only) ──────────────────── -->
  <div class="section" id="practice-mode-section">
    <div class="section-title">
      Practice Mode
      <span id="auth-required-badge" class="auth-required-badge">🔒 Sign in to unlock</span>
    </div>
    <div class="radio-group" id="grp-mode">

      <label class="radio-option selected disabled" id="mode-mixed-opt">
        <input type="radio" name="practicemode" value="mixed" checked disabled />
        <div class="radio-dot"></div>
        <div class="radio-text">
          <span class="radio-label">🔀 Mixed <span class="mode-badge">Default</span></span>
          <span class="radio-sublabel">70 % review + 30 % new — smart mix that always adds fresh vocabulary</span>
        </div>
      </label>

      <label class="radio-option disabled" id="mode-learn-opt">
        <input type="radio" name="practicemode" value="learn" disabled />
        <div class="radio-dot"></div>
        <div class="radio-text">
          <span class="radio-label">🌱 Learn</span>
          <span class="radio-sublabel">Only new items you haven't practiced yet</span>
        </div>
      </label>

      <label class="radio-option disabled" id="mode-review-opt">
        <input type="radio" name="practicemode" value="review" disabled />
        <div class="radio-dot"></div>
        <div class="radio-text">
          <span class="radio-label">🔁 Review</span>
          <span class="radio-sublabel">Only items due for review based on your progress</span>
        </div>
      </label>

    </div>
  </div>

  <button class="start-btn" id="start-btn" onclick="startExercise()">Start Practice →</button>

  <script src="js/nouns-data.js"></script>
  <script src="js/config-prefs.js"></script>
  <script>
    function buildCategoryOptions(selectedIds) {
      const validIds = new Set(NOUN_CATEGORIES.map(c => c.id));
      let selected = null;
      if (Array.isArray(selectedIds)) {
        const filtered = selectedIds.filter(id => validIds.has(id));
        if (filtered.length > 0) {
          selected = new Set(filtered);
        }
      }

      const group = document.getElementById('grp-category');
      group.innerHTML = NOUN_CATEGORIES.map((cat, i) => {
        const checked = selected ? selected.has(cat.id) : i === 0;
        return `
        <label class="checkbox-option${checked ? ' selected' : ''}">
          <input type="checkbox" name="category" value="${cat.id}"${checked ? ' checked' : ''} />
          <div class="checkbox-box"></div>
          <div class="radio-text">
            <span class="radio-label">${cat.emoji} ${cat.label}</span>
          </div>
        </label>
      `;
      }).join('');

      group.querySelectorAll('.checkbox-option').forEach(opt => {
        const checkbox = opt.querySelector('input[type="checkbox"]');
        checkbox.addEventListener('change', () => {
          opt.classList.toggle('selected', checkbox.checked);
        });
      });
    }

    function setAllCategories(checked) {
      document.querySelectorAll('#grp-category .checkbox-option').forEach(opt => {
        const checkbox = opt.querySelector('input[type="checkbox"]');
        if (!checkbox) {
          return;
        }
        checkbox.checked = checked;
        opt.classList.toggle('selected', checked);
      });
    }

    function loadNounPrefs() {
      const prefs = loadConfigPrefs(CONFIG_PREFS_KEYS.nouns);
      buildCategoryOptions(prefs?.categories);
      applyCommonExercisePrefs(prefs, [
        { name: 'extype', key: 'exerciseType' },
        'count',
        { name: 'timelimit', key: 'timeLimit' },
        'audio',
      ]);
    }

    initRadioGroups();

    document.getElementById('select-all-categories').addEventListener('click', () => {
      setAllCategories(true);
    });
    document.getElementById('clear-categories').addEventListener('click', () => {
      setAllCategories(false);
    });

    function startExercise() {
      const categories = getCheckboxValues('category');

      if (categories.length === 0) {
        alert('Please select at least one category.');
        return;
      }

      const config = {
        categories,
        exerciseType:  getRadioValue('extype')       || 'en-to-da',
        count:         getRadioValue('count')        || '10',
        timeLimit:     getRadioValue('timelimit')    || '0',
        audio:         getRadioValue('audio')        || 'on',
        practiceMode:  (typeof isLoggedIn === 'function' && isLoggedIn())
                         ? (getRadioValue('practicemode') || 'mixed')
                         : null,
      };

      saveConfigPrefs(CONFIG_PREFS_KEYS.nouns, config);
      sessionStorage.setItem('nounConfig', JSON.stringify(config));
      window.location.href = 'nouns-exercise.html';
    }

    function setPracticeModeEnabled(enabled) {
      const badge   = document.getElementById('auth-required-badge');
      const section = document.getElementById('practice-mode-section');
      const options = section.querySelectorAll('.radio-option');
      const radios  = section.querySelectorAll('input[type="radio"]');

      badge.style.display = enabled ? 'none' : '';

      options.forEach(opt => {
        radios.forEach(r => { r.disabled = !enabled; });
        if (enabled) {
          opt.classList.remove('disabled');
          opt.addEventListener('click', _modeClickHandler);
        } else {
          opt.classList.add('disabled');
          opt.removeEventListener('click', _modeClickHandler);
        }
      });
    }

    function _modeClickHandler() {
      const radio = this.querySelector('input[type="radio"]');
      if (!radio || radio.disabled) return;
      radio.checked = true;
      document.querySelectorAll('#grp-mode .radio-option').forEach(o => o.classList.remove('selected'));
      this.classList.add('selected');
    }

    window.addEventListener('load', () => {
      twemoji.parse(document.body, { folder: 'svg', ext: '.svg' });
      loadNounPrefs();
      initAuth(
        () => { renderAuthButton(); setPracticeModeEnabled(true);  },
        () => { renderAuthButton(); setPracticeModeEnabled(false); }
      );
    });
  </script>
</body>
</html>
